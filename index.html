<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Mission: The Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50; /* Matches your game background */
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Takes up the full height of the window */
            text-align: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            max-width: 600px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            color: #FFD700; /* Gold color for a cartoonish pop */
            text-shadow: 2px 2px 4px #000;
        }

        p {
            font-size: 1.2em;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .instructions {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .play-btn {
            display: inline-block;
            background-color: #e74c3c; /* Red button */
            color: white;
            font-size: 1.5em;
            font-weight: bold;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            border: 3px solid #c0392b;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .play-btn:hover {
            background-color: #c0392b;
            transform: scale(1.05); /* Slight zoom on hover */
            cursor: pointer;
        }

        .character-preview {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="t.png" alt="Main Character" class="character-preview" onerror="this.style.display='none'">

        <h1>SPACE MISSION</h1>
        <p>Take to the skies! Dodge enemy fire, blast through falling satellites, and successfully navigate your rocket to a smooth lunar landing.</p>
        
        <div class="instructions">
            <strong>Phase 1:</strong> Use Left/Right arrows to move. Press Space to shoot.<br>
            <strong>Phase 2:</strong> Use Up arrow to thrust. Use Left/Right to steer. Land softly!
        </div>

        <a href="game.html" class="play-btn">START GAME</a>
    </div>

</body>
</html>
