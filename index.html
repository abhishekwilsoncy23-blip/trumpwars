<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agent Arcade</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: white; font-family: Arial, sans-serif; }
        canvas { display: block; margin: 0 auto; background: #333; }
        
        /* Mobile Controls */
        #controls { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: space-around; }
        .btn { padding: 15px 25px; font-size: 18px; font-weight: bold; background: rgba(255,255,255,0.2); border: 2px solid white; color: white; border-radius: 10px; user-select: none; }
        .btn:active { background: rgba(255,255,255,0.5); }
        
        /* UI Overlays */
        #uiLayer, #mainMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 10; }
        #uiMessage { font-size: 24px; margin-bottom: 20px; padding: 20px; }
        .menu-btn { padding: 15px 30px; font-size: 20px; cursor: pointer; margin: 10px; background: #3498db; color: white; border: none; border-radius: 5px; }
        .menu-btn:hover { background: #2980b9; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div id="controls">
        <div class="btn" id="btnLeft">LEFT</div>
        <div class="btn" id="btnAction">FIRE</div>
        <div class="btn" id="btnRight">RIGHT</div>
    </div>

    <div id="mainMenu">
        <h1>Agent Arcade</h1>
        <button class="menu-btn" onclick="startNewGame()">NEW GAME</button>
        <button class="menu-btn" onclick="loadSavedGame()" id="continueBtn">CONTINUE</button>
    </div>

    <div id="uiLayer" style="display: none;">
        <div id="uiMessage"></div>
        <button class="menu-btn" id="uiButton">NEXT</button>
    </div>

    <script src="main.js"></script>
    <script src="level1.js"></script>
    <script src="level2.js"></script>
    <script src="level3.js"></script>
    <script src="level4.js"></script>
    

</body>
</html>
