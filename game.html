<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 1: Satellite Shooter & Moon Mission</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling on mobile */
            touch-action: none; /* Prevents zooming/panning on touch */
        }

        #gameWrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        /* Scales the game to fit any screen while keeping the 800x600 ratio */
        canvas {
            background-color: #87CEEB; 
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 8 / 6;
            box-shadow: 0 0 10px rgba(0,0,0,1);
        }

        /* UI Overlays for Buttons */
        #uiLayer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        h2 { font-size: 3em; margin-bottom: 10px; text-align: center; }
        .btn {
            padding: 15px 40px; font-size: 1.5em; font-weight: bold; cursor: pointer;
            color: white; border: none; border-radius: 10px; margin-top: 20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }
        #btnRestart { background-color: #e74c3c; }
        #btnNextLevel { background-color: #2ecc71; }

        /* Mobile Touch Controls */
        #mobileControls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            max-width: 800px;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 5;
        }
        .touch-btn {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white; color: white;
            width: 60px; height: 60px; border-radius: 50%;
            font-size: 24px; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            user-select: none;
        }
        .touch-group { display: flex; gap: 15px; }

        /* Rotate Screen Warning for Mobile Portrait */
        #rotateScreen {
            display: none; position: absolute; top:0; left:0; width: 100%; height: 100%;
            background: #2c3e50; z-index: 20; justify-content: center; align-items: center;
            text-align: center; padding: 20px; box-sizing: border-box; font-size: 1.5em;
        }

        @media (max-width: 768px) {
            #mobileControls { display: flex; } /* Show controls on mobile */
        }
        @media (orientation: portrait) and (max-width: 768px) {
            #rotateScreen { display: flex; } /* Force landscape */
            #gameWrapper { display: none; }
        }
    </style>
</head>
<body>

    <div id="rotateScreen">Please rotate your phone sideways (Landscape) to play!</div>

    <div id="gameWrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="mobileControls">
            <div class="touch-group">
                <div class="touch-btn" id="btnLeft">←</div>
                <div class="touch-btn" id="btnRight">→</div>
            </div>
            <div class="touch-btn" id="btnAction" style="width: 80px; border-radius: 20px;">FIRE</div>
        </div>

        <div id="uiLayer">
            <h2 id="uiMessage">Message</h2>
            <button id="btnRestart" class="btn" style="display:none;" onclick="resetLevel1()">Restart Level</button>
            <button id="btnNextLevel" class="btn" style="display:none;" onclick="startLevel2()">Start Level 2</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const uiLayer = document.getElementById("uiLayer");
    const uiMessage = document.getElementById("uiMessage");
    const btnRestart = document.getElementById("btnRestart");
    const btnNextLevel = document.getElementById("btnNextLevel");

    // Game States: 1 = Shooter, 2 = Moon Lander, 3 = Game Over, 4 = Level 1 Victory, 5 = Level 2
    let gameState = 1; 

    // --- INPUT HANDLING (Keyboard + Touch) ---
    const keys = {};
    window.addEventListener("keydown", (e) => keys[e.code] = true);
    window.addEventListener("keyup", (e) => keys[e.code] = false);

    // Touch Event Listeners mapping to Keys
    function bindTouch(elementId, keyCode) {
        const el = document.getElementById(elementId);
        el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyCode] = true; });
        el.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyCode] = false; });
    }
    bindTouch("btnLeft", "ArrowLeft");
    bindTouch("btnRight", "ArrowRight");
    // Action button acts as Space (Phase 1) and Up Arrow (Phase 2)
    const btnAction = document.getElementById("btnAction");
    btnAction.addEventListener("touchstart", (e) => { e.preventDefault(); keys["Space"] = true; keys["ArrowUp"] = true; });
    btnAction.addEventListener("touchend", (e) => { e.preventDefault(); keys["Space"] = false; keys["ArrowUp"] = false; });


    // =====================================================================
    //                        START OF LEVEL 1 
    // =====================================================================

    // --- LEVEL 1 VARIABLES ---
    let player, bullets, enemyBullets, satellites, rocket, moon;

    // Load Images
    const playerImg = new Image(); playerImg.src = 't.png';
    const satImg = new Image(); satImg.src = 'satellite.png'; // Make sure to add this image to your folder!

    function initLevel1() {
        gameState = 1;
        canvas.style.backgroundColor = "#87CEEB"; // Reset sky
        uiLayer.style.display = "none";
        btnRestart.style.display = "none";
        btnNextLevel.style.display = "none";
        document.getElementById("btnAction").innerText = "FIRE";

        player = { x: 375, y: 500, width: 50, height: 80, speed: 5, color: "blue", cooldown: 0 };
        bullets = []; enemyBullets = []; satellites = [];
        
        for (let i = 0; i < 5; i++) {
            satellites.push({
                x: 100 + (i * 120), y: 50, width: 60, height: 40, 
                speed: 2 + Math.random(), direction: 1
            });
        }

        rocket = { x: 375, y: 500, width: 30, height: 60, dx: 0, dy: 0, thrust: 0.1, gravity: 0.05 };
        moon = { x: 400, y: 100, radius: 60 };
    }

    // Initialize variables on first load
    initLevel1();

    // Reset Function tied to the Restart Button
    function resetLevel1() {
        initLevel1();
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
    }

    // --- LEVEL 1 LOGIC & DRAWING ---
    function updatePhase1() {
        if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
        if (keys["ArrowRight"] && player.x + player.width < canvas.width) player.x += player.speed;

        if (keys["Space"] && player.cooldown <= 0) {
            bullets.push({ x: player.x + player.width/2 - 5, y: player.y, width: 10, height: 20, speed: 7 });
            player.cooldown = 20;
        }
        if (player.cooldown > 0) player.cooldown--;

        bullets.forEach((b, index) => { b.y -= b.speed; if (b.y < 0) bullets.splice(index, 1); });

        enemyBullets.forEach((eb, index) => {
            eb.y += eb.speed;
            if (eb.y > canvas.height) enemyBullets.splice(index, 1);
            if (checkCollision(eb, player)) triggerGameOver("Hit by Satellite Debris!");
        });

        satellites.forEach((sat, sIndex) => {
            sat.x += sat.speed * sat.direction;
            if (sat.x <= 0 || sat.x + sat.width >= canvas.width) sat.direction *= -1;
            
            if (Math.random() < 0.015) {
                enemyBullets.push({ x: sat.x + sat.width/2 - 5, y: sat.y + sat.height, width: 10, height: 10, speed: 4 });
            }
            
            bullets.forEach((b, bIndex) => {
                if (checkCollision(b, sat)) {
                    satellites.splice(sIndex, 1);
                    bullets.splice(bIndex, 1);
                }
            });
        });

        if (satellites.length === 0) {
            gameState = 2; 
            canvas.style.backgroundColor = "#000022"; 
            document.getElementById("btnAction").innerText = "THRUST"; // Change mobile button text
        }
    }

    function drawPhase1() {
        // Draw Player
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        try { if(playerImg.complete && playerImg.naturalHeight !== 0) ctx.drawImage(playerImg, player.x, player.y, player.width, player.height); } catch(e){}

        // Draw Bullets
        ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
        ctx.fillStyle = "red"; enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, eb.width, eb.height));
        
        // Draw Satellites (Image if available, else Emoji)
        satellites.forEach(sat => {
            if (satImg.complete && satImg.naturalHeight !== 0) {
                ctx.drawImage(satImg, sat.x, sat.y, sat.width, sat.height);
            } else {
                ctx.font = "40px Arial";
                ctx.fillText("🛰️", sat.x, sat.y + 35);
            }
        });
    }

    function updatePhase2() {
        rocket.dy += rocket.gravity;
        if (keys["ArrowUp"]) rocket.dy -= rocket.thrust * 2;
        if (keys["ArrowLeft"]) rocket.dx -= rocket.thrust;
        if (keys["ArrowRight"]) rocket.dx += rocket.thrust;

        rocket.x += rocket.dx;
        rocket.y += rocket.dy;

        if (rocket.x < 0 || rocket.x > canvas.width || rocket.y > canvas.height) {
            triggerGameOver("Lost in Space!");
        }

        let dist = Math.hypot(rocket.x + rocket.width/2 - moon.x, rocket.y - moon.y);
        if (dist < moon.radius + rocket.height/2) {
            if (rocket.dy < 2) {
                triggerVictory();
            } else {
                triggerGameOver("Crashed into the Moon!");
            }
        }
    }

    function drawPhase2() {
        ctx.font = "120px Arial";
        ctx.fillText("🌕", moon.x - 60, moon.y + 40); // Better moon icon

        ctx.fillStyle = "white";
        ctx.fillRect(rocket.x, rocket.y, rocket.width, rocket.height);
        
        if (keys["ArrowUp"]) {
            ctx.fillStyle = "orange";
            ctx.beginPath();
            ctx.moveTo(rocket.x, rocket.y + rocket.height);
            ctx.lineTo(rocket.x + rocket.width, rocket.y + rocket.height);
            ctx.lineTo(rocket.x + rocket.width/2, rocket.y + rocket.height + 25 + Math.random() * 10);
            ctx.fill();
        }
    }

    // --- UI HELPERS ---
    function triggerGameOver(reason) {
        gameState = 3;
        uiLayer.style.display = "flex";
        uiMessage.style.color = "#e74c3c";
        uiMessage.innerHTML = "GAME OVER<br><span style='font-size: 0.5em; color: white'>" + reason + "</span>";
        btnRestart.style.display = "block";
    }

    function triggerVictory() {
        gameState = 4;
        uiLayer.style.display = "flex";
        uiMessage.style.color = "#2ecc71";
        uiMessage.innerText = "LEVEL 1 COMPLETE!";
        btnNextLevel.style.display = "block";
    }

    // =====================================================================
    //                         END OF LEVEL 1
    // =====================================================================

    // =====================================================================
    //                 START OF LEVEL 2 (ADD YOUR CODE HERE)
    // =====================================================================
    
    function startLevel2() {
        gameState = 5;
        uiLayer.style.display = "none";
        canvas.style.backgroundColor = "#550000"; // Example background change
        // Initialize Level 2 variables here
    }

    function updateLevel2() {
        // Level 2 Logic
    }

    function drawLevel2() {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("Welcome to Level 2 (In Development)", 100, canvas.height/2);
    }

    // =====================================================================
    //                         END OF LEVEL 2
    // =====================================================================


    // --- MAIN GAME LOOP ---
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 1) {
            updatePhase1();
            drawPhase1();
        } 
        else if (gameState === 2) {
            updatePhase2();
            drawPhase2();
        }
        else if (gameState === 5) {
            updateLevel2();
            drawLevel2();
        }

        // Note: We don't need to draw state 3 and 4 logic here anymore because 
        // the HTML overlays handle the Game Over / Victory visuals!

        requestAnimationFrame(gameLoop);
    }

    gameLoop();

</script>
</body>
</html>
