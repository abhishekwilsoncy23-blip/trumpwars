<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 1: Satellite Shooter & Moon Mission</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #87CEEB; /* Sky blue background */
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            display: block;
            margin: 0 auto;
        }
        p {
            max-width: 800px;
            margin: 10px auto;
        }
    </style>
</head>
<body>

    <h1>Space Mission: Level 1</h1>
    <p><strong>Controls:</strong> Arrow Keys (Left/Right) to move. SPACE to shoot. <br>
       <strong>Phase 2 Controls:</strong> UP Arrow to thrust. Left/Right to adjust trajectory.</p>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Game States: 1 = Shooter, 2 = Moon Lander, 3 = Game Over, 4 = Victory
    let gameState = 1; 

    // --- INPUT HANDLING ---
    const keys = {};
    window.addEventListener("keydown", (e) => keys[e.code] = true);
    window.addEventListener("keyup", (e) => keys[e.code] = false);

    // --- PHASE 1: SHOOTER VARIABLES ---
    const player = {
        x: 375, y: 500, width: 50, height: 80, speed: 5, color: "blue",
        cooldown: 0 // Prevents spam shooting
        // TO ADD YOUR IMAGE:
        player.img.src = 't.png';
        // img: new Image(),
        // (Set player.img.src = 'your_image.jpg' outside this object)
    };

    let bullets = [];
    let enemyBullets = [];
    let satellites = [];
    
    // Create some satellites
    for (let i = 0; i < 5; i++) {
        satellites.push({
            x: 100 + (i * 120), y: 50, width: 60, height: 30, 
            speed: 2 + Math.random(), direction: 1, hp: 1
        });
    }

    // --- PHASE 2: MOON LANDER VARIABLES ---
    const rocket = {
        x: 375, y: 500, width: 30, height: 60,
        dx: 0, dy: 0, thrust: 0.1, gravity: 0.05
    };
    
    const moon = {
        x: 400, y: 100, radius: 60
    };

    // --- CORE FUNCTIONS ---

    // Simple collision detection
    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width &&
               rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height &&
               rect1.y + rect1.height > rect2.y;
    }

    // Phase 1 Logic
    function updatePhase1() {
        // Player Movement
        if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
        if (keys["ArrowRight"] && player.x + player.width < canvas.width) player.x += player.speed;

        // Player Shooting
        if (keys["Space"] && player.cooldown <= 0) {
            bullets.push({ x: player.x + player.width/2 - 5, y: player.y, width: 10, height: 20, speed: 7 });
            player.cooldown = 20; // Frames until next shot
        }
        if (player.cooldown > 0) player.cooldown--;

        // Update Bullets
        bullets.forEach((b, index) => {
            b.y -= b.speed;
            if (b.y < 0) bullets.splice(index, 1);
        });

        enemyBullets.forEach((eb, index) => {
            eb.y += eb.speed;
            if (eb.y > canvas.height) enemyBullets.splice(index, 1);
            
            // Check if player gets hit
            if (checkCollision(eb, player)) {
                gameState = 3; // Game Over
            }
        });

        // Update Satellites
        satellites.forEach((sat, sIndex) => {
            sat.x += sat.speed * sat.direction;
            
            // Bounce off walls
            if (sat.x <= 0 || sat.x + sat.width >= canvas.width) {
                sat.direction *= -1;
            }

            // Randomly shoot back
            if (Math.random() < 0.01) {
                enemyBullets.push({ x: sat.x + sat.width/2 - 5, y: sat.y + sat.height, width: 10, height: 10, speed: 4 });
            }

            // Check if satellite is hit
            bullets.forEach((b, bIndex) => {
                if (checkCollision(b, sat)) {
                    satellites.splice(sIndex, 1);
                    bullets.splice(bIndex, 1);
                }
            });
        });

        // Win Phase 1 Condition
        if (satellites.length === 0) {
            gameState = 2; // Move to Moon Lander phase
            canvas.style.backgroundColor = "#000022"; // Change sky to space
        }
    }

    function drawPhase1() {
        // Draw Player (Replace fillRect with ctx.drawImage to use your generated cartoon)
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
        
        // Example of how to draw an image instead:
        // ctx.drawImage(player.img, player.x, player.y, player.width, player.height);

        // Draw Bullets
        ctx.fillStyle = "yellow";
        bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

        ctx.fillStyle = "red";
        enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, eb.width, eb.height));

        // Draw Satellites
        ctx.fillStyle = "gray";
        satellites.forEach(sat => ctx.fillRect(sat.x, sat.y, sat.width, sat.height));
    }

    // Phase 2 Logic
    function updatePhase2() {
        // Apply Physics
        rocket.dy += rocket.gravity;

        // Thrust and Trajectory
        if (keys["ArrowUp"]) rocket.dy -= rocket.thrust * 2;
        if (keys["ArrowLeft"]) rocket.dx -= rocket.thrust;
        if (keys["ArrowRight"]) rocket.dx += rocket.thrust;

        rocket.x += rocket.dx;
        rocket.y += rocket.dy;

        // Collision with walls (Game Over)
        if (rocket.x < 0 || rocket.x > canvas.width || rocket.y > canvas.height) {
            gameState = 3; 
        }

        // Collision with Moon (Victory)
        let dist = Math.hypot(rocket.x + rocket.width/2 - moon.x, rocket.y - moon.y);
        if (dist < moon.radius + rocket.height/2) {
            // Check if landing was soft enough
            if (rocket.dy < 2) {
                gameState = 4; // Win!
            } else {
                gameState = 3; // Crashed too hard
            }
        }
    }

    function drawPhase2() {
        // Draw Moon
        ctx.fillStyle = "lightgray";
        ctx.beginPath();
        ctx.arc(moon.x, moon.y, moon.radius, 0, Math.PI * 2);
        ctx.fill();

        // Draw Rocket
        ctx.fillStyle = "white";
        ctx.fillRect(rocket.x, rocket.y, rocket.width, rocket.height);
        
        // Draw rocket engine flame if thrusting
        if (keys["ArrowUp"]) {
            ctx.fillStyle = "orange";
            ctx.beginPath();
            ctx.moveTo(rocket.x, rocket.y + rocket.height);
            ctx.lineTo(rocket.x + rocket.width, rocket.y + rocket.height);
            ctx.lineTo(rocket.x + rocket.width/2, rocket.y + rocket.height + 20 + Math.random() * 10);
            ctx.fill();
        }
    }

    // --- MAIN GAME LOOP ---
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 1) {
            updatePhase1();
            drawPhase1();
        } 
        else if (gameState === 2) {
            updatePhase2();
            drawPhase2();
        }
        else if (gameState === 3) {
            ctx.fillStyle = "red";
            ctx.font = "50px Arial";
            ctx.fillText("GAME OVER", canvas.width/2 - 150, canvas.height/2);
            ctx.font = "20px Arial";
            ctx.fillText("Refresh the page to try again.", canvas.width/2 - 130, canvas.height/2 + 40);
        }
        else if (gameState === 4) {
            ctx.fillStyle = "green";
            ctx.font = "50px Arial";
            ctx.fillText("MISSION ACCOMPLISHED!", canvas.width/2 - 300, canvas.height/2);
        }

        requestAnimationFrame(gameLoop);
    }

    // Start the game
    gameLoop();

</script>
</body>
</html>
