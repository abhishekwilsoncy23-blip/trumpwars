<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Level 1 & 2: Space & Berlin Wall</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #2c3e50; color: white; font-family: Arial, sans-serif;
            overflow: hidden; touch-action: none;
        }

        #gameWrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #000;
        }

        canvas {
            background-color: #87CEEB; 
            max-width: 100%; max-height: 100%; aspect-ratio: 8 / 6;
            box-shadow: 0 0 10px rgba(0,0,0,1);
        }

        #startScreen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50; z-index: 30; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; text-align: center; padding: 20px; box-sizing: border-box;
        }

        #uiLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.8); z-index: 10; text-align: center;
        }

        h2 { font-size: 3em; margin-bottom: 10px; text-align: center; padding: 0 20px;}
        .btn {
            padding: 15px 40px; font-size: 1.5em; font-weight: bold; cursor: pointer;
            color: white; border: none; border-radius: 10px; margin-top: 20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
        }
        #btnRestart { background-color: #e74c3c; }
        #btnNextLevel { background-color: #2ecc71; }

        #mobileControls {
            position: absolute; bottom: 20px; width: 100%; max-width: 800px;
            display: none; justify-content: space-between; padding: 0 20px;
            box-sizing: border-box; z-index: 5;
        }
        .touch-btn {
            background: rgba(255, 255, 255, 0.3); border: 2px solid white; color: white;
            width: 60px; height: 60px; border-radius: 50%;
            font-size: 24px; font-weight: bold; display: flex; justify-content: center; align-items: center;
            user-select: none;
        }
        .touch-group { display: flex; gap: 15px; }

        #rotateScreen {
            display: none; position: absolute; top:0; left:0; width: 100%; height: 100%;
            background: #2c3e50; z-index: 40; justify-content: center; align-items: center;
            text-align: center; padding: 20px; box-sizing: border-box; font-size: 1.5em;
        }

        @media (max-width: 768px) { #mobileControls { display: flex; } }
        @media (orientation: portrait) and (max-width: 768px) {
            #rotateScreen { display: flex; } 
            #gameWrapper, #startScreen { display: none; }
        }
    </style>
</head>
<body>

    <div id="rotateScreen">Please rotate your phone sideways (Landscape) to play!</div>

    <div id="startScreen">
        <h1>SATELLITE SHOOTER & WALL SMASHER</h1>
        <p style="color: #2ecc71; font-size: 1.5em; margin-top: 20px;">Tap anywhere to Start & go Fullscreen</p>
    </div>

    <div id="gameWrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="mobileControls">
            <div class="touch-group">
                <div class="touch-btn" id="btnLeft">←</div>
                <div class="touch-btn" id="btnRight">→</div>
            </div>
            <div class="touch-btn" id="btnAction" style="width: 80px; border-radius: 20px;">FIRE</div>
        </div>

        <div id="uiLayer">
            <h2 id="uiMessage">Message</h2>
            <button id="btnRestart" class="btn" style="display:none;">Restart Level</button>
            <button id="btnNextLevel" class="btn" style="display:none;">Start Level 2</button>
        </div>
    </div>

<script>
    // --- FULLSCREEN & START LOGIC ---
    const startScreen = document.getElementById("startScreen");
    startScreen.addEventListener("click", () => {
        const docElm = document.documentElement;
        if (docElm.requestFullscreen) docElm.requestFullscreen();
        else if (docElm.webkitRequestFullscreen) docElm.webkitRequestFullscreen();
        else if (docElm.msRequestFullscreen) docElm.msRequestFullscreen();
        
        startScreen.style.display = "none";
        initLevel1();
        gameLoop();
    });

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const uiLayer = document.getElementById("uiLayer");
    const uiMessage = document.getElementById("uiMessage");
    const btnRestart = document.getElementById("btnRestart");
    const btnNextLevel = document.getElementById("btnNextLevel");

    let gameState = 0; 

    // --- INPUT HANDLING ---
    const keys = {};
    window.addEventListener("keydown", (e) => keys[e.code] = true);
    window.addEventListener("keyup", (e) => keys[e.code] = false);

    function bindTouch(elementId, keyCode) {
        const el = document.getElementById(elementId);
        el.addEventListener("touchstart", (e) => { e.preventDefault(); keys[keyCode] = true; });
        el.addEventListener("touchend", (e) => { e.preventDefault(); keys[keyCode] = false; });
    }
    bindTouch("btnLeft", "ArrowLeft");
    bindTouch("btnRight", "ArrowRight");
    const btnAction = document.getElementById("btnAction");
    btnAction.addEventListener("touchstart", (e) => { e.preventDefault(); keys["Space"] = true; keys["ArrowUp"] = true; });
    btnAction.addEventListener("touchend", (e) => { e.preventDefault(); keys["Space"] = false; keys["ArrowUp"] = false; });

    // --- UI HELPERS ---
    function triggerGameOver(reason, retryCallback) {
        gameState = 3; 
        uiLayer.style.display = "flex"; 
        uiMessage.style.color = "#e74c3c";
        uiMessage.innerHTML = "GAME OVER<br><span style='font-size: 0.5em; color: white'>" + reason + "</span>";
        btnRestart.style.display = "block"; 
        btnNextLevel.style.display = "none";
        btnRestart.onclick = retryCallback;
    }

    function triggerVictory(message, nextCallback) {
        gameState = 4; 
        uiLayer.style.display = "flex"; 
        uiMessage.style.color = "#2ecc71";
        uiMessage.innerHTML = message;
        btnRestart.style.display = "none";
        if (nextCallback) {
            btnNextLevel.style.display = "block";
            btnNextLevel.innerText = "Start Next Level";
            btnNextLevel.onclick = nextCallback;
        } else {
            btnNextLevel.style.display = "none";
        }
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
    }

    // ==========================================
    // --- LEVEL 1 VARIABLES & LOGIC (SPACE) ---
    // ==========================================
    let player, bullets, enemyBullets, satellites, rocket, moon;
    const playerImg = new Image(); playerImg.src = 't.png';
    const satImg = new Image(); satImg.src = 'satellite.png'; 

    function initLevel1() {
        gameState = 1;
        canvas.style.backgroundColor = "#87CEEB"; 
        uiLayer.style.display = "none";
        document.getElementById("btnAction").innerText = "FIRE";
        document.getElementById("btnAction").style.opacity = "1";

        player = { x: 375, y: 500, width: 50, height: 80, speed: 5, color: "blue", cooldown: 0 };
        bullets = []; enemyBullets = []; satellites = [];
        
        for (let i = 0; i < 5; i++) {
            satellites.push({
                x: 100 + (i * 120), y: 50, width: 60, height: 40, 
                speed: 2 + Math.random(), direction: 1
            });
        }

        rocket = { 
            x: 50, y: 500, width: 30, height: 60, vx: 0, vy: 0, gravity: 0.2, 
            angle: -Math.PI / 4, power: 0, maxPower: 28, isLaunched: false, wasActionPressed: false
        };
        moon = { x: 700, y: 150, radius: 55 }; 
    }

    function updatePhase1() {
        if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
        if (keys["ArrowRight"] && player.x + player.width < canvas.width) player.x += player.speed;

        if (keys["Space"] && player.cooldown <= 0) {
            bullets.push({ x: player.x + player.width/2 - 5, y: player.y, width: 10, height: 20, speed: 7 });
            player.cooldown = 20;
        }
        if (player.cooldown > 0) player.cooldown--;

        bullets.forEach((b, index) => { b.y -= b.speed; if (b.y < 0) bullets.splice(index, 1); });

        enemyBullets.forEach((eb, index) => {
            eb.y += eb.speed;
            if (eb.y > canvas.height) enemyBullets.splice(index, 1);
            if (checkCollision(eb, player)) triggerGameOver("Hit by Satellite Debris!", initLevel1);
        });

        satellites.forEach((sat, sIndex) => {
            sat.x += sat.speed * sat.direction;
            if (sat.x <= 0 || sat.x + sat.width >= canvas.width) sat.direction *= -1;
            
            if (Math.random() < 0.015) {
                enemyBullets.push({ x: sat.x + sat.width/2 - 5, y: sat.y + sat.height, width: 10, height: 10, speed: 4 });
            }
            
            bullets.forEach((b, bIndex) => {
                if (checkCollision(b, sat)) {
                    satellites.splice(sIndex, 1); bullets.splice(bIndex, 1);
                }
            });
        });

        if (satellites.length === 0) {
            gameState = 2; 
            canvas.style.backgroundColor = "#000022"; 
            document.getElementById("btnAction").innerText = "HOLD"; 
            keys["Space"] = false; keys["ArrowUp"] = false;
        }
    }

    function drawPhase1() {
        ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, player.width, player.height);
        try { if(playerImg.complete && playerImg.naturalHeight !== 0) ctx.drawImage(playerImg, player.x, player.y, player.width, player.height); } catch(e){}

        ctx.fillStyle = "yellow"; bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));
        ctx.fillStyle = "red"; enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, eb.width, eb.height));
        
        satellites.forEach(sat => {
            if (satImg.complete && satImg.naturalHeight !== 0) {
                ctx.drawImage(satImg, sat.x, sat.y, sat.width, sat.height);
            } else {
                ctx.font = "40px Arial"; ctx.fillText("🛰️", sat.x, sat.y + 35);
            }
        });
    }

    function updatePhase2() {
        if (!rocket.isLaunched) {
            if (keys["ArrowLeft"]) rocket.angle -= 0.05;
            if (keys["ArrowRight"]) rocket.angle += 0.05;

            if (rocket.angle < -Math.PI) rocket.angle = -Math.PI; 
            if (rocket.angle > 0) rocket.angle = 0; 

            let actionPressed = keys["Space"] || keys["ArrowUp"];
            if (actionPressed) {
                rocket.power += 0.4;
                if (rocket.power > rocket.maxPower) rocket.power = rocket.maxPower;
            } else if (rocket.wasActionPressed && !actionPressed) {
                rocket.isLaunched = true;
                rocket.vx = Math.cos(rocket.angle) * rocket.power;
                rocket.vy = Math.sin(rocket.angle) * rocket.power;
                document.getElementById("btnAction").style.opacity = "0.5"; 
            }
            rocket.wasActionPressed = actionPressed;

        } else {
            rocket.vy += rocket.gravity;
            rocket.x += rocket.vx;
            rocket.y += rocket.vy;
            rocket.angle = Math.atan2(rocket.vy, rocket.vx);

            if (rocket.x > canvas.width || rocket.y > canvas.height || rocket.x < 0) {
                triggerGameOver("Missed the Moon! Try adjusting angle and power.", initLevel1);
            }

            let dist = Math.hypot((rocket.x + rocket.width/2) - moon.x, (rocket.y + rocket.height/2) - moon.y);
            if (dist < moon.radius + rocket.height/2) {
                triggerVictory("LEVEL 1 COMPLETE!", initLevel2); 
            }
        }
    }

    function drawPhase2() {
        ctx.font = "110px Arial";
        ctx.fillText("🌕", moon.x - 55, moon.y + 40);

        ctx.save();
        ctx.translate(rocket.x + rocket.width/2, rocket.y + rocket.height/2);
        ctx.rotate(rocket.angle + Math.PI/2); 
        ctx.fillStyle = "white";
        ctx.fillRect(-rocket.width/2, -rocket.height/2, rocket.width, rocket.height);
        
        if (rocket.isLaunched) {
            ctx.fillStyle = "orange";
            ctx.beginPath();
            ctx.moveTo(-rocket.width/2, rocket.height/2);
            ctx.lineTo(rocket.width/2, rocket.height/2);
            ctx.lineTo(0, rocket.height/2 + 25 + Math.random() * 10);
            ctx.fill();
        }
        ctx.restore();

        if (!rocket.isLaunched) {
            ctx.beginPath();
            ctx.setLineDash([5, 10]);
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 2;
            ctx.moveTo(rocket.x + rocket.width/2, rocket.y + rocket.height/2);
            ctx.lineTo(rocket.x + rocket.width/2 + Math.cos(rocket.angle) * 150, 
                       rocket.y + rocket.height/2 + Math.sin(rocket.angle) * 150);
            ctx.stroke();
            ctx.setLineDash([]); 

            ctx.fillStyle = "white"; ctx.font = "20px Arial"; ctx.fillText("POWER", 20, 40);
            ctx.strokeStyle = "white"; ctx.strokeRect(20, 50, 200, 25);
            ctx.fillStyle = "red"; ctx.fillRect(20, 50, (rocket.power / rocket.maxPower) * 200, 25);

            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.font = "18px Arial";
            ctx.fillText("Tap Left/Right to aim. HOLD Fire to charge power. RELEASE to launch!", 100, 580);
        }
    }

    // ==========================================
    // --- LEVEL 2: TACTICAL WALL SMASH ---
    // ==========================================
    let trumpPlayer, level2Bullets, wallBricks;
    let mirrorWidth = 15;

    function initLevel2() {
        gameState = 5; 
        uiLayer.style.display = "none"; 
        canvas.style.backgroundColor = "#5d6d7e"; // Moody grey sky
        document.getElementById("btnAction").innerText = "FIRE";
        document.getElementById("btnAction").style.opacity = "1";
        keys["Space"] = false; keys["ArrowUp"] = false;

        // Player is now a stationary aiming cannon
        trumpPlayer = { x: 375, y: 500, width: 50, height: 80, aimAngle: -Math.PI / 2, cooldown: 0 };
        level2Bullets = [];
        wallBricks = [];

        // Generate wall. Adjusted to account for the mirrors on the sides
        let rows = 4;
        let cols = 10;
        let usableWidth = canvas.width - (mirrorWidth * 2);
        let brickWidth = usableWidth / cols; 
        let brickHeight = 40;

        for(let r = 0; r < rows; r++) {
            for(let c = 0; c < cols; c++) {
                let isBomb = false;
                
                // Force "No Direct Shots": The bottom row, directly above player, is entirely bombs
                if (r === rows - 1 && c >= 3 && c <= 6) {
                    isBomb = true;
                } else {
                    isBomb = Math.random() < 0.15; 
                }
                
                wallBricks.push({ 
                    x: mirrorWidth + (c * brickWidth), 
                    y: 50 + (r * brickHeight), 
                    width: brickWidth - 2, 
                    height: brickHeight - 2, 
                    active: true,
                    isBomb: isBomb
                });
            }
        }
    }

    function updateLevel2() {
        // Aiming Logic (Replaces moving)
        if (keys["ArrowLeft"]) { trumpPlayer.aimAngle -= 0.04; }
        if (keys["ArrowRight"]) { trumpPlayer.aimAngle += 0.04; }

        // Prevent aiming too low (clamp angle)
        if (trumpPlayer.aimAngle < -Math.PI + 0.15) trumpPlayer.aimAngle = -Math.PI + 0.15;
        if (trumpPlayer.aimAngle > -0.15) trumpPlayer.aimAngle = -0.15;

        // Shooting mechanism with angles
        if (keys["Space"] && trumpPlayer.cooldown <= 0) {
            let bulletSpeed = 8;
            level2Bullets.push({ 
                x: trumpPlayer.x + trumpPlayer.width/2 - 5, 
                y: trumpPlayer.y, 
                width: 10, height: 10, // Square bullet for better bouncing physics
                vx: Math.cos(trumpPlayer.aimAngle) * bulletSpeed,
                vy: Math.sin(trumpPlayer.aimAngle) * bulletSpeed
            });
            trumpPlayer.cooldown = 20;
        }
        if (trumpPlayer.cooldown > 0) trumpPlayer.cooldown--;

        let safeBricksLeft = 0;

        // Update Bullets & Check Collisions
        level2Bullets.forEach((b, bIndex) => {
            b.x += b.vx;
            b.y += b.vy;

            // Bounce off Left Mirror
            if (b.x <= mirrorWidth) {
                b.x = mirrorWidth;
                b.vx *= -1;
            }
            // Bounce off Right Mirror
            else if (b.x + b.width >= canvas.width - mirrorWidth) {
                b.x = canvas.width - mirrorWidth - b.width;
                b.vx *= -1;
            }
            // Bounce off Ceiling
            if (b.y <= 0) {
                b.y = 0;
                b.vy *= -1;
            }

            // Remove if it falls off the bottom
            if (b.y > canvas.height) {
                level2Bullets.splice(bIndex, 1);
                return;
            }

            wallBricks.forEach(brick => {
                if (brick.active && checkCollision(b, brick)) {
                    level2Bullets.splice(bIndex, 1); // Bullet destroyed on impact
                    
                    if (brick.isBomb) {
                        triggerGameOver("You shot a BOMB! The wall exploded.", initLevel2);
                    } else {
                        brick.active = false; 
                    }
                }
            });
        });

        wallBricks.forEach(brick => {
            if (brick.active && !brick.isBomb) safeBricksLeft++;
        });

        if (safeBricksLeft === 0) {
            triggerVictory("THE WALL HAS FALLEN!<br>You mastered the mirrors!", null); 
        }
    }

    function drawLevel2() {
        // Draw Mirrors
        ctx.fillStyle = "#00FFFF"; // Cyan glowing mirrors
        ctx.fillRect(0, 0, mirrorWidth, canvas.height);
        ctx.fillRect(canvas.width - mirrorWidth, 0, mirrorWidth, canvas.height);
        
        // Draw Trump Player (Stationary)
        ctx.fillStyle = "blue"; 
        ctx.fillRect(trumpPlayer.x, trumpPlayer.y, trumpPlayer.width, trumpPlayer.height);
        try { 
            if(playerImg.complete && playerImg.naturalHeight !== 0) {
                ctx.drawImage(playerImg, trumpPlayer.x, trumpPlayer.y, trumpPlayer.width, trumpPlayer.height); 
            }
        } catch(e){}

        // Draw Aiming Line
        ctx.beginPath();
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 2;
        let startX = trumpPlayer.x + trumpPlayer.width / 2;
        let startY = trumpPlayer.y;
        ctx.moveTo(startX, startY);
        ctx.lineTo(startX + Math.cos(trumpPlayer.aimAngle) * 120, startY + Math.sin(trumpPlayer.aimAngle) * 120);
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw Bullets
        ctx.fillStyle = "yellow"; 
        level2Bullets.forEach(b => {
            ctx.beginPath();
            ctx.arc(b.x + b.width/2, b.y + b.height/2, b.width/2, 0, Math.PI * 2);
            ctx.fill();
        });

        // Draw the Wall (Bricks and Bombs)
        wallBricks.forEach(brick => {
            if (brick.active) {
                if (brick.isBomb) {
                    ctx.fillStyle = "#c0392b"; 
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    ctx.fillStyle = "black";
                    ctx.font = "20px Arial";
                    ctx.fillText("💣", brick.x + brick.width/2 - 12, brick.y + brick.height/2 + 7);
                } else {
                    ctx.fillStyle = "#aab7b8"; 
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                }
                ctx.strokeStyle = "#7f8c8d";
                ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
            }
        });
        
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.font = "18px Arial";
        ctx.fillText("Aim: Left/Right | Shoot: FIRE | Direct shots are blocked! Bounce off Cyan Mirrors.", 70, 580);
    }

    // ==========================================
    // --- MAIN GAME LOOP ---
    // ==========================================
    function gameLoop() {
        if (gameState === 0) return; 

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 1) { updatePhase1(); drawPhase1(); } 
        else if (gameState === 2) { updatePhase2(); drawPhase2(); }
        else if (gameState === 5) { updateLevel2(); drawLevel2(); }

        requestAnimationFrame(gameLoop);
    }

</script>
</body>
</html>
